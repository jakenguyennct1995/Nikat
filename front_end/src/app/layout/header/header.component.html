<header class="sticky top-0 z-10 border-b border-slate-200 bg-white/95 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
    <a routerLink="/" class="text-xl font-bold text-brand-700">NovaShop</a>
    <nav class="hidden items-center gap-6 md:flex">
      <a routerLink="/" class="text-sm font-medium text-slate-700 hover:text-brand-700">Home</a>
      <a routerLink="/products" class="text-sm font-medium text-slate-700 hover:text-brand-700">Products</a>
      <a routerLink="/cart" class="text-sm font-medium text-slate-700 hover:text-brand-700">
        Cart ({{ cartCount() }})
      </a>
      @if (authService.hasRole('ROLE_ADMIN')) {
        <a routerLink="/admin" class="text-sm font-medium text-slate-700 hover:text-brand-700">Admin</a>
      }
    </nav>

    <div class="flex items-center gap-2">
      @if (!authService.isLoggedIn()) {
        <a routerLink="/login" class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">Login</a>
        <a routerLink="/register" class="btn-primary">Register</a>
      } @else {
        <span class="hidden text-sm text-slate-600 sm:inline">{{ authService.currentUser()?.fullName }}</span>
        <button type="button" (click)="logout()" class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">Logout</button>
      }
    </div>
  </div>
</header>
