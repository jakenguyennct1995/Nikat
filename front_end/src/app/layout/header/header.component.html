<header class="sticky top-0 z-10 border-b border-[#e09c98]/30 bg-white/90 font-['Plus_Jakarta_Sans'] backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
    <a routerLink="/" class="text-2xl font-extrabold text-[#a83206] drop-shadow-sm">NiKat</a>
    <nav class="hidden items-center gap-6 md:flex text-[#4e2120]">
      <a routerLink="/" class="text-sm font-bold uppercase tracking-widest hover:text-[#a83206] transition-colors">Trang
        chủ</a>
      <a routerLink="/products"
        class="text-sm font-bold uppercase tracking-widest hover:text-[#a83206] transition-colors">Sản phẩm</a>
      <a routerLink="/cart" class="text-sm font-bold uppercase tracking-widest hover:text-[#a83206] transition-colors">
        Giỏ hàng ({{ cartCount() }})
      </a>
      @if (authService.hasRole('ROLE_ADMIN')) {
      <a routerLink="/admin"
        class="text-sm font-bold uppercase tracking-widest hover:text-[#a83206] transition-colors">Quản trị</a>
      }
    </nav>

    <div class="flex items-center gap-2">
      @if (!authService.isLoggedIn()) {
      <a routerLink="/login"
        class="rounded-xl px-4 py-2.5 text-sm font-bold text-[#4e2120] transition hover:bg-[#ffedeb]">Đăng nhập</a>
      <a routerLink="/register"
        class="inline-flex items-center rounded-xl bg-gradient-to-r from-[#a83206] to-[#ff784e] px-4 py-2.5 text-sm font-bold text-[#ffefeb] shadow-sm transition hover:scale-[1.02]">
        Đăng ký
      </a>
      } @else {
      <span class="hidden text-sm font-bold text-[#834c4a] sm:inline mr-2">{{ authService.currentUser()?.fullName
        }}</span>
      <button type="button" (click)="logout()"
        class="rounded-xl px-4 py-2 text-sm font-bold text-[#a83206] transition hover:bg-[#ffedeb]">Đăng xuất</button>
      }
    </div>
  </div>
</header>
